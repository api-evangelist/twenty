aid: twenty
name: Twenty
description: 'Twenty is an open-source CRM platform built as a modern alternative
  to Salesforce, designed for teams that need flexibility, data ownership, and a contemporary
  developer experience. It provides REST and GraphQL APIs covering core CRM operations
  such as managing companies, people, opportunities, notes, tasks, and fully customizable
  objects. Developers can extend Twenty with custom objects, server-side logic, UI
  components, and AI agents as TypeScript packages, all surfaced through the same
  API surface. The platform is available as a cloud service or as a self-hosted deployment
  via Docker Compose, giving teams full control over their data residency and infrastructure.

  '
type: Index
