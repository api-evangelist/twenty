apis:
- aid: twenty:core-api
  name: Twenty Core API
  description: 'The Twenty Core API provides REST and GraphQL endpoints for CRUD operations
    on all CRM records including companies, people, opportunities, notes, tasks, and
    any custom objects defined in a workspace. Both interfaces support batch operations
    of up to 60 records per request, filtering, and relation traversal. GraphQL additionally
    supports batch upsert using plural object names. Authentication is via bearer
    token generated from the workspace settings. The API schema is per-tenant and
    adapts automatically as custom objects are added.

    '
  type: Contract
  tags:
  - CRM
  - REST
  - GraphQL
  - Companies
  - People
  - Opportunities
  contact:
