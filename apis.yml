  - url: graphql/twenty-graphql.md
    type: GraphQL
- aid: twenty:metadata-api
  name: Twenty Metadata API
  description: 'The Twenty Metadata API provides REST and GraphQL endpoints for programmatic
    schema management, allowing developers to create, update, and delete custom objects,
    fields, and relations within a workspace. Changes made through the Metadata API
    are immediately reflected in the Core API surface, enabling dynamic data modeling
    at runtime. The base paths are /rest/metadata/ for REST and /metadata/ for GraphQL.

    '
