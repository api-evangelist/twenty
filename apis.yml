apis:
  - aid: twenty:core-api
    name: Twenty Core API
    description: >
      The Twenty Core API provides REST and GraphQL endpoints for CRUD
      operations on all CRM records including companies, people,
      opportunities, notes, tasks, and any custom objects defined in a
      workspace. Both interfaces support batch operations of up to 60
      records per request, filtering, and relation traversal. GraphQL
      additionally supports batch upsert using plural object names.
      Authentication is via bearer token generated from the workspace
      settings. The API schema is per-tenant and adapts automatically as
      custom objects are added.
    type: Contract
    tags:
      - CRM
      - REST
      - GraphQL
      - Companies
      - People
      - Opportunities
    contact:
      - FN: Twenty Developer Documentation
        url: https://docs.twenty.com/developers/extend/api
    properties:
      - type: Documentation
        url: https://docs.twenty.com/developers/extend/api
      - type: OpenAPI
        url: https://api.twenty.com/open-api
  - aid: twenty:metadata-api
    name: Twenty Metadata API
    description: >
      The Twenty Metadata API provides REST and GraphQL endpoints for
      programmatic schema management, allowing developers to create, update,
      and delete custom objects, fields, and relations within a workspace.
      Changes made through the Metadata API are immediately reflected in
      the Core API surface, enabling dynamic data modeling at runtime. The
      base paths are /rest/metadata/ for REST and /metadata/ for GraphQL.
    type: Contract
    tags:
      - Metadata
      - Schema Management
      - Custom Objects
      - REST
      - GraphQL
    contact:
      - FN: Twenty Developer Documentation
        url: https://docs.twenty.com/developers/extend/api
    properties:
      - type: Documentation
        url: https://docs.twenty.com/developers/extend/api
