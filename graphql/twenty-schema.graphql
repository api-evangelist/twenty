# ---------------------------------------------------------------------------
# Query
# Per-object pattern: {object}(id) findOne, {objects}(...) findMany,
# {objects}Duplicates findDuplicates, {objects}GroupBy groupBy
# ---------------------------------------------------------------------------

type Query {
  # Company
  company(id: UUID!): Company
  companies(filter: CompanyFilter, orderBy: [CompanyOrderByInput!], first: Int, last: Int, before: String, after: String): CompanyConnection!
  companiesDuplicates(data: CreateCompanyInput, id: UUID): CompanyConnection!

  # Person
  person(id: UUID!): Person
  people(filter: PersonFilter, orderBy: [PersonOrderByInput!], first: Int, last: Int, before: String, after: String): PersonConnection!
  peopleDuplicates(data: CreatePersonInput, id: UUID): PersonConnection!

  # Opportunity
  opportunity(id: UUID!): Opportunity
  opportunities(filter: OpportunityFilter, orderBy: [OpportunityOrderByInput!], first: Int, last: Int, before: String, after: String): OpportunityConnection!
  opportunitiesDuplicates(data: CreateOpportunityInput, id: UUID): OpportunityConnection!

  # Note
  note(id: UUID!): Note
  notes(filter: NoteFilter, orderBy: [NoteOrderByInput!], first: Int, last: Int, before: String, after: String): NoteConnection!
  notesDuplicates(data: CreateNoteInput, id: UUID): NoteConnection!

  # NoteTarget
  noteTarget(id: UUID!): NoteTarget
  noteTargets(filter: NoteTargetFilter, orderBy: [NoteTargetOrderByInput!], first: Int, last: Int, before: String, after: String): NoteTargetConnection!

  # Task
  task(id: UUID!): Task
  tasks(filter: TaskFilter, orderBy: [TaskOrderByInput!], first: Int, last: Int, before: String, after: String): TaskConnection!
  tasksDuplicates(data: CreateTaskInput, id: UUID): TaskConnection!

  # TaskTarget
  taskTarget(id: UUID!): TaskTarget
  taskTargets(filter: TaskTargetFilter, orderBy: [TaskTargetOrderByInput!], first: Int, last: Int, before: String, after: String): TaskTargetConnection!

  # WorkspaceMember
  workspaceMember(id: UUID!): WorkspaceMember
  workspaceMembers(filter: WorkspaceMemberFilter, orderBy: [WorkspaceMemberOrderByInput!], first: Int, last: Int, before: String, after: String): WorkspaceMemberConnection!

