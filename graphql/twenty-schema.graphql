# ---------------------------------------------------------------------------
# Relay pagination
# ---------------------------------------------------------------------------

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# ---------------------------------------------------------------------------
# Filter scalars
# ---------------------------------------------------------------------------

enum FilterIs {
  NULL
  NOT_NULL
}

enum OrderByDirection {
  AscNullsFirst
  AscNullsLast
  DescNullsFirst
  DescNullsLast
}

input StringFilter {
  eq: String
  neq: String
  like: String
  ilike: String
  in: [String!]
  is: FilterIs
  startsWith: String
}

input IDFilter {
  eq: UUID
  neq: UUID
  in: [UUID!]
  is: FilterIs
}

input DateFilter {
  eq: DateTime
  neq: DateTime
  gt: DateTime
  gte: DateTime
  lt: DateTime
  lte: DateTime
  in: [DateTime!]
  is: FilterIs
}

input FloatFilter {
  eq: Float
  neq: Float
  gt: Float
  gte: Float
  lt: Float
  lte: Float
  in: [Float!]
  is: FilterIs
}

input BooleanFilter {
  eq: Boolean
  is: FilterIs
}

