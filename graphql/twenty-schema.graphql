"""
Twenty CRM GraphQL Schema (Core API + Metadata API)

Core API endpoint:     https://api.twenty.com/graphql
Metadata API endpoint: https://api.twenty.com/metadata

Authentication: Bearer token via Authorization header.
Tokens are generated from Workspace Settings -> Security -> API Keys.

The schema is generated dynamically per workspace. Standard objects are listed
below. Custom objects added through the Metadata API appear with identical
query/mutation fields automatically generated.

Relay-style cursor pagination is used throughout (Connection / Edge / PageInfo).
Batch operations accept up to 60 records per request.

Source: packages/twenty-server/src/modules/*/standard-objects/*.workspace-entity.ts
        packages/twenty-server/src/engine/api/graphql/workspace-resolver-builder/
"""

schema {
  query: Query
  mutation: Mutation
}

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

scalar DateTime
scalar JSON
scalar UUID
scalar Upload

