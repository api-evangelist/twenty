openapi: 3.0.3
info:
  title: Twenty Core API
  description: >
    The Twenty Core API provides REST endpoints for CRUD operations on all CRM
    records including companies, people, opportunities, notes, tasks, and any
    custom objects defined in a workspace. All list endpoints use cursor-based
    pagination. Authentication is via Bearer token generated from workspace
    Settings → Playground. The API schema is per-tenant and adapts automatically
    as custom objects are added.

    Note: The full workspace-specific schema is available at
    https://api.twenty.com/open-api/core (requires Bearer token) and reflects all
    standard and custom objects configured in your workspace.
  version: v0.1
  contact:
    email: felix@twenty.com
  license:
    name: AGPL-3.0
    url: https://github.com/twentyhq/twenty?tab=License-1-ov-file#readme
  termsOfService: https://github.com/twentyhq/twenty?tab=coc-ov-file#readme
externalDocs:
  description: Twenty Developer Documentation
  url: https://docs.twenty.com/developers/extend/api
servers:
  - url: https://api.twenty.com/rest/core
    description: Production
tags:
  - name: companies
    description: Company CRM records
  - name: people
    description: Person/contact CRM records
  - name: opportunities
    description: Opportunity/deal CRM records
  - name: notes
    description: Note records associated with CRM objects
  - name: tasks
    description: Task records associated with CRM objects
  - name: openapi
    description: OpenAPI schema discovery
security:
  - bearerAuth: []
paths:
  /open-api/core:
    get:
      tags:
        - openapi
      summary: Get Core OpenAPI Schema
      description: >
        Returns the full workspace-specific OpenAPI schema for the core API,
        including all standard and custom objects. Requires authentication.
      operationId: getCoreOpenApiSchema
      servers:
        - url: https://api.twenty.com
      responses:
        '200':
          description: OpenAPI document
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/401'

  /companies:
    get:
      tags:
        - companies
      summary: Find Many Companies
      description: >
        Returns a paginated list of companies. Use filter, order_by, limit,
        starting_after, and ending_before to control results.
      operationId: findManyCompanies
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/depth'
        - $ref: '#/components/parameters/startingAfter'
        - $ref: '#/components/parameters/endingBefore'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyListResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
    post:
      tags:
        - companies
      summary: Create One Company
      operationId: createOneCompany
      parameters:
        - $ref: '#/components/parameters/depth'
        - $ref: '#/components/parameters/upsert'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyInput'
            example:
              name: Acme Corp
              domainName:
                primaryLinkUrl: https://acme.com
                primaryLinkLabel: Acme
              address:
                addressStreet1: 123 Main St
                addressCity: San Francisco
                addressState: CA
                addressCountry: US
                addressPostcode: '94102'
      responses:
        '201':
          description: Company created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'

  /batch/companies:
    post:
      tags:
        - companies
      summary: Create Many Companies
      operationId: createManyCompanies
      parameters:
        - $ref: '#/components/parameters/depth'
        - $ref: '#/components/parameters/upsert'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CompanyInput'
              maxItems: 60
      responses:
        '201':
          description: Companies created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      createCompanies:
                        type: array
                        items:
