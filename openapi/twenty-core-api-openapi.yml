components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Workspace-scoped Bearer token. Generate from Settings → Playground in
        your Twenty workspace.

  parameters:
    id:
      name: id
      in: path
      required: true
      description: Object UUID
      schema:
        type: string
        format: uuid
    filter:
      name: filter
      in: query
      required: false
      description: >
        Filter expression. Format: field[COMPARATOR]:value. Multiple conditions
        separated by comma (AND). Supports eq, neq, in, is, gt, gte, lt, lte,
        like, ilike, startsWith, containsAny. Composable with and(), or(), not().
      schema:
        type: string
      examples:
        simple:
          value: 'name[eq]:"Acme"'
        dateRange:
          value: 'createdAt[gte]:"2024-01-01"'
        composite:
          value: 'emails.primaryEmail[eq]:foo@example.com'
        logical:
          value: 'or(stage[eq]:"NEW",stage[eq]:"IN_PROGRESS")'
    orderBy:
      name: order_by
      in: query
      required: false
      description: >
        Ordering. Format: field1,field2[DIRECTION]. Directions: AscNullsFirst,
        AscNullsLast, DescNullsFirst, DescNullsLast.
      schema:
        type: string
      examples:
        simple:
          value: createdAt
        complex:
          value: 'id[AscNullsFirst],createdAt[DescNullsLast]'
    limit:
      name: limit
      in: query
      required: false
      description: Maximum number of records to return (default 60, max 60).
      schema:
        type: integer
        minimum: 0
        maximum: 60
        default: 60
    depth:
      name: depth
      in: query
      required: false
      description: >
        Depth of nested relations to include. 0 = primary object only;
        1 = primary object + direct relations.
      schema:
        type: integer
        enum: [0, 1]
        default: 1
    startingAfter:
      name: starting_after
      in: query
      required: false
      description: Cursor for forward pagination (use endCursor from previous response).
      schema:
        type: string
    endingBefore:
      name: ending_before
      in: query
      required: false
      description: Cursor for backward pagination (use startCursor from current response).
      schema:
        type: string
    upsert:
      name: upsert
      in: query
      required: false
      description: If true, creates or updates if record already exists.
      schema:
        type: boolean
        default: false

  schemas:
    PageInfo:
      type: object
      properties:
        hasNextPage:
          type: boolean
        hasPreviousPage:
          type: boolean
        startCursor:
          type: string
          nullable: true
        endCursor:
          type: string
          nullable: true

    LinksMetadata:
      type: object
      description: Link with a primary URL and optional label
      properties:
        primaryLinkUrl:
          type: string
          format: uri
          nullable: true
        primaryLinkLabel:
          type: string
          nullable: true
        secondaryLinks:
          type: array
          nullable: true
          items:
            type: object
            properties:
              url:
                type: string
                format: uri
              label:
                type: string

    CurrencyMetadata:
      type: object
      description: Monetary amount with currency code
      properties:
        amountMicros:
          type: integer
          format: int64
          description: Amount in micros (e.g. 1000000 = 1.00)
          nullable: true
        currencyCode:
          type: string
          description: ISO 4217 currency code
          example: USD
          nullable: true

    AddressMetadata:
      type: object
      description: Postal address
      properties:
        addressStreet1:
          type: string
          nullable: true
        addressStreet2:
          type: string
          nullable: true
        addressCity:
          type: string
          nullable: true
        addressState:
          type: string
          nullable: true
        addressCountry:
          type: string
          nullable: true
        addressPostcode:
          type: string
          nullable: true
        addressLat:
          type: number
          nullable: true
        addressLng:
          type: number
          nullable: true

    FullNameMetadata:
      type: object
      description: Person full name
      properties:
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true

    EmailsMetadata:
      type: object
      description: Email addresses
      properties:
        primaryEmail:
          type: string
          format: email
          nullable: true
        additionalEmails:
          type: array
          nullable: true
          items:
            type: string
            format: email

    PhonesMetadata:
      type: object
      description: Phone numbers
      properties:
        primaryPhoneNumber:
          type: string
          nullable: true
        primaryPhoneCountryCode:
          type: string
          nullable: true
        primaryPhoneCallingCode:
          type: string
          nullable: true
        additionalPhones:
          type: array
          nullable: true
          items:
            type: object

    ActorMetadata:
      type: object
      description: Record of who created or last updated an object
      properties:
        source:
          type: string
          enum: [EMAIL, CALENDAR, API, IMPORT, MANUAL, SYSTEM, WORKFLOW, WEBHOOK]
        workspaceMemberId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          nullable: true
        context:
          type: object
          nullable: true

    RichTextMetadata:
      type: object
      description: Rich text content (block-based)
      properties:
        blocknote:
          type: string
          nullable: true
        markdown:
          type: string
          nullable: true

    # --- Company ---
    Company:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        name:
          type: string
          nullable: true
        domainName:
          $ref: '#/components/schemas/LinksMetadata'
        linkedinLink:
          allOf:
            - $ref: '#/components/schemas/LinksMetadata'
          nullable: true
        annualRevenue:
          allOf:
            - $ref: '#/components/schemas/CurrencyMetadata'
          nullable: true
        address:
          $ref: '#/components/schemas/AddressMetadata'
        position:
          type: number
        createdBy:
